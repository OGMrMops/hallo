### Was wurde optimiert?
1. **Keine künstliche Verzögerung:** Der `fetch` wird losgetreten und im exakt selben Moment wird `window.location.href` geändert. Für den User fühlt sich der Scan extrem flüssig an.
2. **Deutsche Zeit:** Der Zeitstempel nutzt jetzt direkt `toLocaleString('de-DE')` mit der Berliner Zeitzone, sodass du in Discord sofort die echte Uhrzeit ablesen kannst, ohne das unhandliche ISO-Format (`2026-06-01T19:43...`) im Kopf umrechnen zu müssen.
3. **Farb-Code:** Discord-Embeds verarbeiten Farben am besten als Integer-Zahlen. `0xff00ff` wurde zur Sicherheit in den entsprechenden Dezimalwert `16711935` übersetzt, damit das Embed garantiert im leuchtenden Neon-Pink erstrahlt.
